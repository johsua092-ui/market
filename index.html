<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ELITE BUILD Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#020508;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  font-family:'Rajdhani',sans-serif;
}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}

.ui{position:relative;z-index:1;text-align:center;padding:40px 20px}

.eyebrow{
  display:inline-flex;align-items:center;gap:9px;
  font-size:11px;letter-spacing:.22em;color:#3a5a6a;
  margin-bottom:28px;
}
.ey-dot{
  width:6px;height:6px;background:#00ffd5;
  border-radius:50%;box-shadow:0 0 10px #00ffd5;
  animation:dp 1.5s ease-in-out infinite;flex-shrink:0;
}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

/* HEADLINE */
.headline{
  font-family:'Orbitron',monospace;
  font-weight:900;
  font-size:clamp(36px,9vw,80px);
  line-height:.9;
  position:relative;
}

.line-plain{
  display:block;color:#cee0ea;
  letter-spacing:.04em;
  animation:lineIn .8s cubic-bezier(.16,1,.3,1) both;
}
.l1{animation-delay:0s}.l3{animation-delay:.16s}
@keyframes lineIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ACCENT LINE WRAPPER */
.accent-wrap{
  display:flex;align-items:center;justify-content:center;
  position:relative;
  animation:lineIn .8s cubic-bezier(.16,1,.3,1) .08s both;
}

/* EACH CHARACTER */
.c{
  display:inline-block;
  font-family:'Orbitron',monospace;
  font-weight:900;
  background:linear-gradient(160deg,#ffffff 0%,#00ffd5 35%,#b06dff 65%,#ffc432 85%,#ffffff 100%);
  background-size:300% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:charSweep 3s linear infinite, charWave 2.8s ease-in-out infinite;
}
.sp{display:inline-block;width:.26em}

.c:nth-child(1){animation-delay:0s,0s}
.c:nth-child(2){animation-delay:-.24s,.09s}
.c:nth-child(3){animation-delay:-.48s,.18s}
.c:nth-child(4){animation-delay:-.72s,.27s}
.c:nth-child(5){animation-delay:-.96s,.36s}
.c:nth-child(7){animation-delay:-1.05s,.45s}
.c:nth-child(8){animation-delay:-1.29s,.54s}
.c:nth-child(9){animation-delay:-1.53s,.63s}
.c:nth-child(10){animation-delay:-1.77s,.72s}
.c:nth-child(11){animation-delay:-2.01s,.81s}

@keyframes charSweep{
  0%  {background-position:260% 50%}
  100%{background-position:-60% 50%}
}
@keyframes charWave{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-11px)}
}

/* UNDERLINE */
.uline{
  position:absolute;
  bottom:-12px;
  height:3px;
  border-radius:2px;
  background:linear-gradient(90deg,#ff2d55,#b06dff,#00ffd5,#ffc432);
  background-size:200% 100%;
  box-shadow:0 0 10px rgba(0,255,213,.8),0 0 22px rgba(176,109,255,.5);
  animation:uSlide 2.4s linear infinite, uGrow 4s ease-in-out infinite;
}
@keyframes uSlide{0%{background-position:200% 0}100%{background-position:-100% 0}}
@keyframes uGrow{
  0%,100%{width:8%;left:46%;opacity:.4}
  45%,55%{width:88%;left:6%;opacity:1}
}

/* bottom text */
.sub{
  font-size:13px;letter-spacing:.18em;color:#2e404d;
  margin-top:36px;
}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="ui">
  <div class="eyebrow"><span class="ey-dot"></span>OXYX STORE — BUILD MARKETPLACE</div>

  <div class="headline">
    <span class="line-plain l1">THE MOST</span>

    <span class="accent-wrap">
      <span class="c">E</span><span class="c">L</span><span class="c">I</span><span class="c">T</span><span class="c">E</span>
      <span class="sp"> </span>
      <span class="c">B</span><span class="c">U</span><span class="c">I</span><span class="c">L</span><span class="c">D</span>
      <span class="uline"></span>
    </span>

    <span class="line-plain l3">MARKETPLACE</span>
  </div>

  <div class="sub">BUY &nbsp;·&nbsp; SELL &nbsp;·&nbsp; UPLOAD .BUILD</div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,pts=[];
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
function initPts(){
  pts=[];
  for(let i=0;i<45;i++) pts.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*.38,vy:(Math.random()-.5)*.38,
    r:Math.random()*1.3+.4,
    c:['rgba(0,255,213,','rgba(176,109,255,','rgba(0,255,136,','rgba(255,196,50,'][Math.floor(Math.random()*4)]
  });
}
function draw(){
  ctx.clearRect(0,0,W,H);
  pts.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.c+'.45)';ctx.fill();
    pts.slice(i+1).forEach(q=>{
      const d=Math.hypot(p.x-q.x,p.y-q.y);
      if(d<110){
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
        ctx.strokeStyle=`rgba(0,255,213,${.07*(1-d/110)})`;
        ctx.lineWidth=.5;ctx.stroke();
      }
    });
  });
  requestAnimationFrame(draw);
}
resize();initPts();draw();
window.addEventListener('resize',()=>{resize();initPts();});
</script>
</body>
</html>
