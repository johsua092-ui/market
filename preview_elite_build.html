<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ELITE BUILD — OXYX STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--a:#00ffd5;--v:#b06dff;--r:#ff2d55;--g:#00ff88;--gold:#ffc432;--bg:#020508;--t2:#5a7585;--t3:#2e404d}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
canvas{position:fixed;pointer-events:none}
#cvBase{inset:0;z-index:1}
#cvGrid{inset:0;z-index:2}
#cvAurora{inset:0;z-index:3}
#cvRings{inset:0;z-index:4}
#cvParts{inset:0;z-index:5}
.scanlines{position:fixed;inset:0;z-index:6;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px)}
.vignette{position:fixed;inset:0;z-index:7;pointer-events:none;background:radial-gradient(ellipse 80% 70% at 50% 50%,transparent 40%,rgba(2,5,8,.75) 100%)}
.corner{position:fixed;z-index:8;pointer-events:none;width:60px;height:60px}
.corner svg{width:100%;height:100%}
.c-tl{top:20px;left:20px}.c-tr{top:20px;right:20px;transform:scaleX(-1)}.c-bl{bottom:20px;left:20px;transform:scaleY(-1)}.c-br{bottom:20px;right:20px;transform:scale(-1,-1)}
.sideline{position:fixed;z-index:8;pointer-events:none;width:1px;top:80px;bottom:80px;background:linear-gradient(180deg,transparent,rgba(0,255,213,.2),rgba(176,109,255,.12),transparent)}
.sl-left{left:40px}.sl-right{right:40px}
.hex-layer{position:fixed;inset:0;z-index:6;pointer-events:none;overflow:hidden}
.hex{position:absolute;border:1px solid;border-radius:2px;animation:hexFloat linear infinite}
@keyframes hexFloat{0%{transform:translateY(110vh) rotate(0deg);opacity:0}5%{opacity:1}95%{opacity:.4}100%{transform:translateY(-20vh) rotate(720deg);opacity:0}}
.stream-layer{position:fixed;inset:0;z-index:5;pointer-events:none;overflow:hidden}
.stream-col{position:absolute;top:-20px;font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.6;animation:streamFall linear infinite;white-space:nowrap}
@keyframes streamFall{0%{transform:translateY(-100%);opacity:0}5%{opacity:1}90%{opacity:.6}100%{transform:translateY(110vh);opacity:0}}
.top-bar{position:fixed;top:0;left:0;right:0;height:1px;z-index:20;background:linear-gradient(90deg,transparent,var(--a),var(--v),var(--r),transparent);background-size:200%;animation:barFlow 4s linear infinite}
.bot-bar{position:fixed;bottom:0;left:0;right:0;height:1px;z-index:20;background:linear-gradient(90deg,transparent,var(--v),var(--a),transparent);background-size:200%;animation:barFlow 5s linear infinite reverse}
@keyframes barFlow{0%{background-position:200%}100%{background-position:-100%}}
.live-badge{position:fixed;top:22px;right:90px;z-index:20;display:flex;align-items:center;gap:7px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--g);letter-spacing:.14em;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);padding:5px 12px;border-radius:4px}
.live-dot{width:6px;height:6px;background:var(--g);border-radius:50%;box-shadow:0 0 8px var(--g);animation:dp 1.2s ease-in-out infinite}
.content{position:relative;z-index:10;text-align:center;padding:20px;width:100%;max-width:880px}
.eyebrow{display:inline-flex;align-items:center;gap:9px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.28em;color:var(--t2);margin-bottom:22px;padding:5px 16px;background:rgba(0,255,213,.04);border:1px solid rgba(0,255,213,.15);border-radius:20px}
.ey-dot{width:5px;height:5px;background:var(--a);border-radius:50%;box-shadow:0 0 10px var(--a);animation:dp 1.5s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.2}}
.headline{font-family:'Orbitron',monospace;font-weight:900;line-height:.88;position:relative}
.line-plain{display:block;font-size:clamp(20px,4.5vw,50px);color:rgba(180,200,220,.7);letter-spacing:.08em;animation:lineIn .8s cubic-bezier(.16,1,.3,1) both}
.l1{animation-delay:0s}.l3{animation-delay:.18s}
@keyframes lineIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.accent-wrap{display:flex;align-items:center;justify-content:center;position:relative;animation:lineIn .9s cubic-bezier(.16,1,.3,1) .09s both;padding:6px 0}
.c{display:inline-block;font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(34px,7.5vw,68px);background:linear-gradient(145deg,#ffffff 0%,var(--a) 30%,var(--v) 55%,#ff6ec7 72%,var(--gold) 88%,#ffffff 100%);background-size:280% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:cSweep 3.2s linear infinite,cWave 2.8s ease-in-out infinite;position:relative}
.sp{display:inline-block;width:.26em}
.c:nth-child(1){animation-delay:0s,0s}.c:nth-child(2){animation-delay:-.25s,.08s}.c:nth-child(3){animation-delay:-.5s,.16s}.c:nth-child(4){animation-delay:-.75s,.24s}.c:nth-child(5){animation-delay:-1s,.32s}.c:nth-child(7){animation-delay:-1.1s,.4s}.c:nth-child(8){animation-delay:-1.35s,.48s}.c:nth-child(9){animation-delay:-1.6s,.56s}.c:nth-child(10){animation-delay:-1.85s,.64s}.c:nth-child(11){animation-delay:-2.1s,.72s}
@keyframes cSweep{0%{background-position:250% 50%}100%{background-position:-80% 50%}}
@keyframes cWave{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.uline{position:absolute;bottom:-12px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--r),var(--v),var(--a),var(--gold));background-size:200% 100%;box-shadow:0 0 12px rgba(0,255,213,.9),0 0 24px rgba(176,109,255,.5);animation:uSlide 2.2s linear infinite,uGrow 4s ease-in-out infinite}
@keyframes uSlide{0%{background-position:200% 0}100%{background-position:-100% 0}}
@keyframes uGrow{0%,100%{width:6%;left:47%;opacity:.3}45%,55%{width:92%;left:4%;opacity:1}}
.stats{display:flex;align-items:center;justify-content:center;margin-top:30px;font-family:'Share Tech Mono',monospace}
.stat{text-align:center;padding:0 22px}
.sn{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--a),var(--v));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:sIn 2s ease-out both}
.sn.s1{animation-delay:.6s}.sn.s2{animation-delay:.75s}.sn.s3{animation-delay:.9s}
@keyframes sIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sl{font-size:9px;letter-spacing:.22em;color:var(--t3);margin-top:3px}
.sdiv{width:1px;height:32px;background:linear-gradient(180deg,transparent,var(--t3),transparent)}
.chips{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.chip{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.1em;padding:5px 13px;border-radius:4px;animation:cIn .6s cubic-bezier(.16,1,.3,1) both}
.chip:nth-child(1){background:rgba(0,255,213,.07);border:1px solid rgba(0,255,213,.2);color:var(--a);animation-delay:.8s}
.chip:nth-child(2){background:rgba(176,109,255,.07);border:1px solid rgba(176,109,255,.2);color:var(--v);animation-delay:.9s}
.chip:nth-child(3){background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.2);color:var(--g);animation-delay:1s}
.chip:nth-child(4){background:rgba(255,196,50,.07);border:1px solid rgba(255,196,50,.2);color:var(--gold);animation-delay:1.1s}
@keyframes cIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<canvas id="cvBase"></canvas>
<canvas id="cvGrid"></canvas>
<canvas id="cvAurora"></canvas>
<canvas id="cvRings"></canvas>
<canvas id="cvParts"></canvas>

<div class="scanlines"></div>
<div class="vignette"></div>
<div class="top-bar"></div>
<div class="bot-bar"></div>

<div class="corner c-tl"><svg viewBox="0 0 60 60"><path d="M2 42 L2 2 L42 2" fill="none" stroke="#00ffd5" stroke-width="1.5" opacity=".5"/><circle cx="2" cy="2" r="3" fill="#00ffd5" opacity=".8"/></svg></div>
<div class="corner c-tr"><svg viewBox="0 0 60 60"><path d="M2 42 L2 2 L42 2" fill="none" stroke="#b06dff" stroke-width="1.5" opacity=".5"/><circle cx="2" cy="2" r="3" fill="#b06dff" opacity=".8"/></svg></div>
<div class="corner c-bl"><svg viewBox="0 0 60 60"><path d="M2 42 L2 2 L42 2" fill="none" stroke="#b06dff" stroke-width="1.5" opacity=".5"/><circle cx="2" cy="2" r="3" fill="#b06dff" opacity=".8"/></svg></div>
<div class="corner c-br"><svg viewBox="0 0 60 60"><path d="M2 42 L2 2 L42 2" fill="none" stroke="#00ffd5" stroke-width="1.5" opacity=".5"/><circle cx="2" cy="2" r="3" fill="#00ffd5" opacity=".8"/></svg></div>

<div class="sideline sl-left"></div>
<div class="sideline sl-right"></div>
<div class="hex-layer" id="hexLayer"></div>
<div class="stream-layer" id="streamLayer"></div>
<div class="live-badge"><span class="live-dot"></span>LIVE</div>

<div class="content">
  <div class="eyebrow"><span class="ey-dot"></span>OXYX STORE — ELITE BUILD MARKETPLACE</div>
  <div class="headline">
    <span class="line-plain l1">THE MOST</span>
    <span class="accent-wrap">
      <span class="c">E</span><span class="c">L</span><span class="c">I</span><span class="c">T</span><span class="c">E</span>
      <span class="sp"> </span>
      <span class="c">B</span><span class="c">U</span><span class="c">I</span><span class="c">L</span><span class="c">D</span>
      <span class="uline"></span>
    </span>
    <span class="line-plain l3">MARKETPLACE</span>
  </div>
  <div class="stats">
    <div class="stat"><div class="sn s1" id="sB">0</div><div class="sl">BUILDS</div></div>
    <div class="sdiv"></div>
    <div class="stat"><div class="sn s2" id="sM">0</div><div class="sl">MEMBERS</div></div>
    <div class="sdiv"></div>
    <div class="stat"><div class="sn s3" id="sO">0</div><div class="sl">ONLINE</div></div>
  </div>
  <div class="chips">
    <span class="chip">⬡ .BUILD FORMAT</span>
    <span class="chip">◈ PREMIUM BUILDS</span>
    <span class="chip">✦ FREE BUILDS</span>
    <span class="chip">⚡ INSTANT DOWNLOAD</span>
  </div>
</div>

<script>
// count up
function countUp(el,target,dur){
  let s=null;
  (function step(ts){if(!s)s=ts;const p=Math.min((ts-s)/dur,1),e=1-Math.pow(1-p,3);el.textContent=Math.floor(target*e);if(p<1)requestAnimationFrame(step);})(performance.now());
}
setTimeout(()=>{countUp(document.getElementById('sB'),148,1600);countUp(document.getElementById('sM'),2340,1800);countUp(document.getElementById('sO'),17,1200);},700);

// canvas helper
function mkCv(id){
  const cv=document.getElementById(id),ctx=cv.getContext('2d');
  function r(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  r();window.addEventListener('resize',r);
  return{cv,ctx,get W(){return cv.width},get H(){return cv.height}};
}

// 1. STARS
const B=mkCv('cvBase');
const stars=Array.from({length:180},()=>({sx:Math.random(),sy:Math.random(),r:Math.random()*.9+.1,a:Math.random(),da:Math.random()*.003+.001}));
(function ds(){B.ctx.clearRect(0,0,B.W,B.H);stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;B.ctx.beginPath();B.ctx.arc(s.sx*B.W,s.sy*B.H,s.r,0,Math.PI*2);B.ctx.fillStyle=`rgba(180,210,230,${s.a*.55})`;B.ctx.fill();});requestAnimationFrame(ds);})();

// 2. GRID
const G=mkCv('cvGrid');let gO=0;
(function dg(){const{ctx,W,H}=G;ctx.clearRect(0,0,W,H);gO=(gO+.4)%80;const hy=H*.62,vx=W/2;
  for(let i=-20;i<=20;i++){const x0=vx+i*(W*.055),x1=vx+i*(W*.42);ctx.beginPath();ctx.moveTo(x0,hy);ctx.lineTo(x1,H+20);const a=.07-Math.abs(i)*.003;ctx.strokeStyle=`rgba(0,255,213,${Math.max(0,a)})`;ctx.lineWidth=.5;ctx.stroke();}
  for(let d=0;d<14;d++){const t=(d/14+gO/H*.1)%1,ease=t*t,y=hy+(H-hy+40)*ease,hw=(W*.5)*ease;ctx.beginPath();ctx.moveTo(vx-hw,y);ctx.lineTo(vx+hw,y);ctx.strokeStyle=`rgba(0,255,213,${.055*(1-ease)})`;ctx.lineWidth=.5;ctx.stroke();}
  requestAnimationFrame(dg);})();

// 3. AURORA
const A=mkCv('cvAurora');let at=0;
const blobs=[{x:.25,y:.35,rx:.45,ry:.28,c:'rgba(0,255,213,',ph:0},{x:.75,y:.38,rx:.42,ry:.25,c:'rgba(176,109,255,',ph:1.5},{x:.5,y:.55,rx:.35,ry:.2,c:'rgba(255,45,85,',ph:3},{x:.18,y:.6,rx:.3,ry:.22,c:'rgba(0,255,136,',ph:2},{x:.82,y:.58,rx:.32,ry:.24,c:'rgba(255,196,50,',ph:.8}];
(function da(){const{ctx,W,H}=A;ctx.clearRect(0,0,W,H);at+=.004;blobs.forEach(b=>{const gx=(b.x+Math.sin(at+b.ph)*.08)*W,gy=(b.y+Math.cos(at*.7+b.ph)*.06)*H,gg=ctx.createRadialGradient(gx,gy,0,gx,gy,b.rx*W),pulse=.028+Math.sin(at*1.3+b.ph)*.013;gg.addColorStop(0,b.c+pulse+')');gg.addColorStop(1,b.c+'0)');ctx.fillStyle=gg;ctx.fillRect(0,0,W,H);});requestAnimationFrame(da);})();

// 4. RINGS
const R=mkCv('cvRings');let rA=0;
const rings=[{r:140,c:'rgba(0,255,213,',sp:.003,d:[12,18],w:.8},{r:200,c:'rgba(176,109,255,',sp:-.002,d:[6,28],w:.65},{r:265,c:'rgba(255,196,50,',sp:.0015,d:[20,30],w:.5},{r:340,c:'rgba(0,255,136,',sp:-.001,d:[8,40],w:.4},{r:420,c:'rgba(255,45,85,',sp:.0008,d:[30,50],w:.3}];
(function dr(){const{ctx,W,H}=R;ctx.clearRect(0,0,W,H);rA+=.01;const cx=W/2,cy=H/2;rings.forEach((r,i)=>{const rot=rA*r.sp*100+i*1.2;ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);ctx.beginPath();ctx.ellipse(0,0,r.r,r.r*.27,0,0,Math.PI*2);ctx.strokeStyle=r.c+r.w*.11+')';ctx.lineWidth=r.w;ctx.setLineDash(r.d);ctx.stroke();ctx.restore();const dx=r.r*Math.cos(rot),dy=r.r*.27*Math.sin(rot);ctx.beginPath();ctx.arc(cx+dx,cy+dy,2.2,0,Math.PI*2);ctx.fillStyle=r.c+'.85)';ctx.fill();});requestAnimationFrame(dr);})();

// 5. PARTICLES
const P=mkCv('cvParts');
const pts=Array.from({length:70},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.00017,vy:(Math.random()-.5)*.00017,r:Math.random()*1.4+.4,c:['rgba(0,255,213,','rgba(176,109,255,','rgba(0,255,136,','rgba(255,196,50,'][Math.floor(Math.random()*4)]}));
(function dp2(){const{ctx,W,H}=P;ctx.clearRect(0,0,W,H);pts.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>1)p.vx*=-1;if(p.y<0||p.y>1)p.vy*=-1;ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);ctx.fillStyle=p.c+'.5)';ctx.fill();pts.slice(i+1).forEach(q=>{const d=Math.hypot((p.x-q.x)*W,(p.y-q.y)*H);if(d<115){ctx.beginPath();ctx.moveTo(p.x*W,p.y*H);ctx.lineTo(q.x*W,q.y*H);ctx.strokeStyle=`rgba(0,255,213,${.065*(1-d/115)})`;ctx.lineWidth=.5;ctx.stroke();}});});requestAnimationFrame(dp2);})();

// HEXAGONS
const hL=document.getElementById('hexLayer');
const hC=['rgba(0,255,213,.25)','rgba(176,109,255,.2)','rgba(255,196,50,.15)','rgba(255,45,85,.15)','rgba(0,255,136,.18)'];
function spHex(){const h=document.createElement('div');h.className='hex';const sz=Math.random()*24+8,dur=Math.random()*14+10,col=hC[Math.floor(Math.random()*hC.length)];h.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;border-color:${col};animation-duration:${dur}s;animation-delay:${-Math.random()*dur}s`;hL.appendChild(h);setTimeout(()=>h.remove(),dur*1000+500);}
for(let i=0;i<22;i++)spHex();setInterval(spHex,700);

// DATA STREAM
const sL=document.getElementById('streamLayer');
const chars='01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
function spStream(){const c=document.createElement('div');c.className='stream-col';const n=Math.floor(Math.random()*16+6);c.textContent=Array.from({length:n},()=>chars[Math.floor(Math.random()*chars.length)]).join('\n');const hue=Math.random()>.5?'rgba(0,255,213,':'rgba(176,109,255,';c.style.cssText=`left:${Math.random()*100}%;font-size:${Math.random()*4+9}px;color:${hue}${Math.random()*.28+.08});animation-duration:${Math.random()*8+5}s;animation-delay:${-Math.random()*8}s`;sL.appendChild(c);setTimeout(()=>c.remove(),14000);}
for(let i=0;i<28;i++)spStream();setInterval(spStream,380);
</script>
</body>
</html>
